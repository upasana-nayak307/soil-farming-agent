<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Soil Farming Agent</title>
  <link href="../css/register.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
 </head>
 <body class="h-full">
  <div class="app-wrapper">
   <div class="login-container">
    <div class="login-header">
     <a href="../index.html" class="login-logo">
      <div class="login-logo-icon">
       🌱
      </div><span class="login-logo-text">SoilAgent</span> </a>
     <h1 class="login-title">Welcome back</h1>
     <p class="login-subtitle">Sign in to your farming dashboard</p>
    </div>
    <form id="loginForm" novalidate method="post" onclick="handleLogin(event)">
     
     <!-- Email Field -->
     <div class="form-group">
      <label for="email" class="form-label">Email Address</label> 
      <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
      <div class="error-message" id="emailError"></div>
     </div>
     
     <!-- Password Field -->
     <div class="form-group">
      <label for="password" class="form-label">Password</label> 
      <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
      <div class="password-requirements" id="passwordRequirements">
       <div class="requirement-item">
        <span class="requirement-check" id="check1">✓</span> At least 8 characters
       </div>
       <div class="requirement-item">
        <span class="requirement-check" id="check2">✓</span> One uppercase letter
       </div>
       <div class="requirement-item">
        <span class="requirement-check" id="check3">✓</span> One number
       </div>
      </div>
      <div class="error-message" id="passwordError"></div>
     </div>

    <!-- Success Overlay -->
      <div class="success-overlay" id="successOverlay" role="dialog" aria-modal="true" aria-label="Registration successful">
      <div class="success-card">
        <div class="success-check">
          <i class="fa-solid fa-check"></i>
        </div>
        <h2 class="success-title">Welcome Aboard!</h2>
        <p class="success-text">Your account has been created successfully. 
          You can now sign in to the soil farming agent System.</p>
      </div>
      </div>
  

     <!-- Overall Form Error -->
     <div class="error-message" id="formError"></div>
     <div class="success-message" id="successMessage"></div>
     <!-- Register Button --> 
     <button class="login-btn" id="registerBtn"> Sign in </button>
    </form>
    <div class="login-footer">
     <p class="login-footer-text">Don't have an account? 
        <a href="./register.html" class="login-footer-link"> Sign up </a>
    </p>
    </div>
   </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../javascript/register.js"></script>
</body>
</html>
